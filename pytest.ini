[pytest]
# Test paths
testpaths = tests

# Coverage configuration
addopts =
    --strict-markers
    --tb=short
    -ra
    --cov=src/mcp_india_stack
    --cov-report=term-missing
    --cov-fail-under=90
    --cov-append

# Markers
markers =
    unit: Unit tests for individual tools
    integration: Integration tests for workflows
    security: Security and PII safety tests
    flags: Tests for environment flags and modes
    slow: Tests that take longer to run

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.11